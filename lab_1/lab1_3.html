<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пенсионный калькулятор</title>
</head>
<body>
    <form id="pensionForm">
        <label>Возраст: <input type="number" id="age" required></label><br><br>
        <label><input type="radio" name="gender" value="male" required> Мужской</label>
        <label><input type="radio" name="gender" value="female" required> Женский</label><br><br>
        <button type="submit">Рассчитать</button><br><br>
        <textarea id="result" rows="4" cols="50" readonly></textarea>
    </form>

    <script>
        'use strict';

        document.getElementById('pensionForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const age = parseInt(document.getElementById('age').value);
            const gender = document.querySelector('input[name="gender"]:checked')?.value;
            const resultArea = document.getElementById('result');
            
            let message;
            
            if (isNaN(age) || age < 0) {
                message = "Да кто ты такой?";
            } else if (age >= 0 && age <= 17) {
                message = "Вам работать ещё рано — учитесь";
            } else if (age >= 18 && age <= 59 && gender === 'male') {
                message = "Вам ещё работать и работать";
            } else if (age >= 18 && age <= 54 && gender === 'female') {
                message = "Вам ещё работать и работать";
            } else if (age >= 60 && age <= 64 && gender === 'male') {
                message = "Скоро пенсия!";
            } else if (age >= 55 && age <= 59 && gender === 'female') {
                message = "Скоро пенсия!";
            } else if (age >= 65 && gender === 'male') {
                message = "Вам пора на пенсию";
            } else if (age >= 60 && gender === 'female') {
                message = "Вам пора на пенсию";
            } else {
                message = "Да кто ты такой?";
            }
            
            resultArea.value = message;
        });
    </script>
</body>
</html>
