<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Считать ворон</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        form {
            max-width: 300px;
        }
        input, button {
            margin: 10px 0;
            display: block;
            width: 100%;
            padding: 5px;
            box-sizing: border-box;
        }
        button {
            cursor: pointer;
            background: #6a00ff;
            color: white;
            border: none;
            padding: 8px;
            font-size: 14px;
        }
        button:hover {
            background: #1b00b3;
        }
    </style>
</head>
<body>
    <h1>Считать ворон</h1>
    <form id="ravenForm">
        <label>Количество ворон:</label>
        <input type="number" id="num" required>

        <button type="button" id="countBtn">Считать</button>
    </form>

    <script>
        'use strict';

        function getCrowEnding(num) {
            const lastDigit = Math.abs(num) % 10;
            const lastTwoDigits = Math.abs(num) % 100;

            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                return "ворон";
            }

            switch (lastDigit) {
                case 1:
                    return "ворона";
                case 2:
                case 3:
                case 4:
                    return "вороны";
                default:
                    return "ворон";
            }
        }

        document.getElementById('countBtn').addEventListener('click', function() {
            const input = document.getElementById('num');
            let num = parseInt(input.value, 10);

            if (isNaN(num)) {
                alert("Введите целое число");
                return;
            }

            const ending = getCrowEnding(num);
            alert(`На ветке сидит ${num} ${ending}`);
        });
    </script>
</body>
</html>
