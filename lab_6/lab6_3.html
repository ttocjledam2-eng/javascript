<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактируемый div</title>
    <style>
        .editable-div {
            width: 300px;
            min-height: 100px;
            border: 1px solid #ccc;
            padding: 10px;
            margin: 20px;
            background: white;
        }
        textarea {
            width: 100%;
            height: 100px;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div id="myDiv" class="editable-div">Это редактируемый текст. Нажмите Ctrl+E для редактирования.</div>

    <script>
        'use strict';

        const div = document.getElementById('myDiv');
        let isEditing = false;
        let originalContent = '';
        
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'e') {
                e.preventDefault();
                
                if (!isEditing) {
                    originalContent = div.innerHTML;
                    const textarea = document.createElement('textarea');
                    textarea.value = div.innerHTML;
                    div.innerHTML = '';
                    div.appendChild(textarea);
                    textarea.focus();
                    isEditing = true;
                }
            }
            else if (e.ctrlKey && e.key === 's' && isEditing) {
                e.preventDefault();
                
                const textarea = div.querySelector('textarea');
                div.innerHTML = textarea.value;
                isEditing = false;
            }
            else if (e.key === 'Escape' && isEditing) {
                div.innerHTML = originalContent;
                isEditing = false;
            }
        });
    </script>
</body>
</html>
